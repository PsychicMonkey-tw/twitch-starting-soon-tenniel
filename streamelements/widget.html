<div class="viewport">
  <main class="screen" aria-label="Скоро начнём">
    <div class="scene">
      <img class="layer layer-base" src="{{layerBackground}}" alt="" width="1920" height="1080">
      <img class="layer layer-cat-body" src="{{layerCatBody}}" alt="" width="640" height="362">
      <img class="layer layer-cat-head" src="{{layerCatHead}}" alt="" width="210" height="168">
      <img class="layer layer-alice" src="{{layerAlice}}" alt="" width="380" height="720">
      <div class="channel-anchor">
        <img class="channel-avatar" src="{{channelAvatar}}" alt="">
        <p class="channel-name">{{channelName}}</p>
      </div>
      <div class="title-block">
        <p class="title-text">Скоро начнём</p>
        <p class="title-subtitle">{{titleSubtitle}}</p>
      </div>
      <div class="cat-quote" aria-label="Цитата Чеширского кота">
        <p>{{catQuote}}</p>
      </div>
      <div class="paper-vignette" aria-hidden="true"></div>
    </div>
  </main>
</div>
