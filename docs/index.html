<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скоро начнём — Tenniel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="viewport">
    <main class="screen" aria-label="Скоро начнём">
      <div class="scene">
        <img class="layer layer-base" src="assets/background.jpg" alt="" width="1920" height="1080">
        <img class="layer layer-cat-body" src="assets/cat-body-cutout.png" alt="" width="640" height="362">
        <img class="layer layer-cat-head" src="assets/cat-head-cutout.png" alt="" width="210" height="168">
        <img class="layer layer-alice" src="assets/alice-cutout.png" alt="" width="380" height="720">
        <div class="channel-anchor">
          <img class="channel-avatar" src="" alt="">
          <p class="channel-name"></p>
        </div>
        <div class="title-block">
          <p class="title-text">Скоро начнём</p>
          <p class="title-subtitle"></p>
        </div>
        <div class="cat-quote" aria-label="Цитата Чеширского кота">
          <p>Мы все здесь немного сумасшедшие…</p>
        </div>
        <div class="paper-vignette" aria-hidden="true"></div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
